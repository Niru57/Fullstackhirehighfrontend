<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HireHigh | Login</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Arial, sans-serif;
}

body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #ede9fe,
        #ddd6fe
    );

}


.container{

    width:420px;
    padding:40px;

    background:rgba(255,255,255,0.95);

    border-radius:25px;

    box-shadow:
    0 20px 40px rgba(0,0,0,0.2);

    animation:slideUp 0.8s ease;

}


/* Animation */

@keyframes slideUp{

    from{

        transform:translateY(40px);
        opacity:0;

    }

    to{

        transform:translateY(0);
        opacity:1;

    }

}



/* Logo */


.logo{

    text-align:center;
    margin-bottom:15px;

}


.logo h1{

    color:#2563eb;
    font-size:35px;
    font-weight:700;

}


.logo span{

    color:#f97316;

}



/* Welcome text */


.subtitle{

    text-align:center;
    color:#64748b;

    margin-bottom:30px;

}



/* Input Group */


.input-box{

    margin-bottom:20px;

}


.input-box label{

    display:block;

    color:#1e40af;

    font-weight:600;

    margin-bottom:8px;

}


.input-box input{


    width:100%;

    padding:14px 15px;


    border:1px solid #cbd5e1;

    border-radius:12px;


    font-size:15px;

    outline:none;


    transition:0.3s;


}


.input-box input:focus{


    border-color:#2563eb;


    box-shadow:
    0 0 8px rgba(37,99,235,0.3);


}

/* Login Button */

.login-btn{


    width:100%;

    padding:14px;


    margin-top:10px;


    border:none;


    border-radius:30px;


    background:linear-gradient(
        135deg,
        #2563eb,
        #1d4ed8
    );


    color:white;


    font-size:17px;


    font-weight:600;


    cursor:pointer;


    transition:0.3s;


}



.login-btn:hover{


    transform:translateY(-2px);


    box-shadow:
    0 8px 20px rgba(37,99,235,0.4);


}



/* Links Section */


.links{


    display:flex;

    justify-content:space-between;


    margin-top:25px;


}


.links a{


    text-decoration:none;


    color:#2563eb;


    font-size:14px;


    font-weight:600;


}


.links a:hover{


    text-decoration:underline;


}



/* Home Button */


.home-btn{


    width:100%;


    padding:13px;


    margin-top:25px;


    border:none;


    border-radius:30px;


    background:#f97316;


    color:white;


    font-size:15px;


    font-weight:600;


    cursor:pointer;


    transition:0.3s;


}



.home-btn:hover{


    background:#ea580c;


    transform:translateY(-2px);


}




/* Mobile Responsive */


@media(max-width:480px){


.container{

    width:90%;

    padding:30px;

}


.logo h1{

    font-size:30px;

}


}


</style>

</head>


<body>


<div class="container">


    <div class="logo">

        <h1>
            Hire<span>High</span>
        </h1>

    </div>


    <p class="subtitle">
        Welcome Back! Login to continue
    </p>



    <form id="loginForm">


        <div class="input-box">

            <label>
                Username
            </label>


            <input 
            type="text"
            id="username"
            placeholder="Enter your username"
            required>

        </div>



        <div class="input-box">

            <label>
                Password
            </label>


            <input 
            type="password"
            id="password"
            placeholder="Enter your password"
            required>


        </div>



        <button 
        type="submit"
        class="login-btn">

            Login

        </button>


    </form>


    <div class="links">


        <a href="register.html">
            Create Account
        </a>


        <a href="#">
            Forgot Password?
        </a>


    </div>



    <button 
    class="home-btn"
    onclick="window.location.href='index.html'">


        ⬅ Back to Home


    </button>



</div>

<script>


document
.getElementById("loginForm")
.addEventListener("submit", async function(e){


    e.preventDefault();



    const loginData = {


        username:
        document.getElementById("username").value,


        password:
        document.getElementById("password").value


    };



    try{


        const response = await fetch(
        "https://fullstackhirehighbackend.onrender.com/hirehigh/login",
        {


            method:"POST",


            headers:{


                "Content-Type":"application/json"


            },


            body:
            JSON.stringify(loginData)


        });



        if(response.ok){



            const token =
            await response.text();



            localStorage.setItem(
            "jwt_token",
            token
            );



            localStorage.setItem(
            "username",
            loginData.username
            );



            alert(
            "Login Successful!"
            );



            window.location.href =
            "dashboard.html";



        }

        else{


            const message =
            await response.text();


            alert(message);



        }



    }

    catch(error){


        alert(
        "Server Error! Make sure Spring Boot is running."
        );


    }



});



</script>



</body>

</html>
