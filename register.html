<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireHigh - Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#dbeafe;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:430px;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#1565c0;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:6px;
    font-weight:bold;
    color:#1565c0;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #90caf9;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

input:focus,
select:focus{
    border-color:#1565c0;
}

.register-btn{
    width:100%;
    margin-top:25px;
    padding:12px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:30px;
    font-size:17px;
    cursor:pointer;
}

.register-btn:hover{
    background:#0d47a1;
}

.links{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.links a{
    text-decoration:none;
    color:#1565c0;
    font-weight:bold;
}

.links a:hover{
    color:#0d47a1;
}

.home-btn{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
}

.home-btn:hover{
    background:#ef6c00;
}

</style>

</head>

<body>

<div class="container">

<h1>Create Account</h1>

<p>Join HireHigh and begin your career journey.</p>

<form id="registerForm">

<label>Full Name</label>
<input type="text" id="fullName" placeholder="Enter Full Name" required>

<label>Username</label>
<input type="text" id="username" placeholder="Enter Username" required>

<label>Email</label>
<input type="email" id="email" placeholder="Enter Email" required>

<label>Password</label>
<input type="password" id="password" placeholder="Create Password" required>

<label>Role</label>
<select id="role" required>
    <option value="">Select Role</option>
    <option value="USER">Job Seeker</option>
    <option value="ADMIN">Recruiter</option>
</select>

<button type="submit" class="register-btn">
Create Account
</button>

</form>

<div class="links">
<a href="login.html">Login</a>
<a href="index.html">Home</a>
</div>

<button class="home-btn" onclick="window.location.href='index.html'">
⬅ Back to Home
</button>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit", async function(e){

e.preventDefault();

const user = {

fullName: document.getElementById("fullName").value,
username: document.getElementById("username").value,
email: document.getElementById("email").value,
password: document.getElementById("password").value,
role: document.getElementById("role").value

};

try{

const response = await fetch("https://fullstackhirehighbackend.onrender.com/hirehigh/registers",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(user)

});

if(response.ok){

alert("Registration Successful!");

window.location.href="login.html";

}else{

const error = await response.text();
alert("Registration Failed!\n\n" + error);
}

}catch(err){
    console.error(err);
}

});

</script>

</body>
</html>
